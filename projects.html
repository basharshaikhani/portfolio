    <style>
        /* ── Remove navbar borders ── */
        .navbar .bord { border: none !important; }
        .navbar .bg { background: none !important; backdrop-filter: none !important; }
        .proj-hero-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 80px;
        }
        .proj-hero-wrap img {
            width: 100%;
            display: block;
            border-radius: 12px;
            transform: scale(1.04);
            transition: transform 1.2s cubic-bezier(.22,1,.36,1);
        }
        .proj-hero-wrap.revealed img { transform: scale(1); }
        .proj-hero-overlay {
            position: absolute;
            inset: 0;
            background: linear-gradient(180deg, transparent 50%, rgba(0,0,0,.55) 100%);
            border-radius: 12px;
            pointer-events: none;
        }

        /* ── Breadcrumb ── */
        .proj-breadcrumb {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: #aaa;
            margin-bottom: 40px;
            margin-top: 20px;
        }
        .proj-breadcrumb a { color: #aaa; text-decoration: none; transition: color .2s; }
        .proj-breadcrumb a:hover { color: #28e98c; }
        .proj-breadcrumb span { color: #fff; }

        /* ── Section fade-up ── */
        .fade-up {
            opacity: 0;
            transform: translateY(32px);
            transition: opacity .7s cubic-bezier(.22,1,.36,1), transform .7s cubic-bezier(.22,1,.36,1);
        }
        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* ── Info card ── */
        #sticky_item { position: sticky; top: 110px; }

        .proj-info-card {
            background: #0d0d0d;
            border-radius: 24px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,.06);
            box-shadow: 0 32px 80px rgba(0,0,0,.6);
        }

        /* top accent bar */
        .proj-info-card__bar {
            height: 3px;
            background: linear-gradient(90deg, #28e98c, #1be4af, #28e98c);
            background-size: 200% 100%;
            animation: bar-slide 3s linear infinite;
        }
        @keyframes bar-slide {
            0%   { background-position: 0% 0%; }
            100% { background-position: 200% 0%; }
        }

        /* header */
        .proj-info-card__head {
            padding: 26px 28px 20px;
            border-bottom: 1px solid rgba(255,255,255,.05);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .proj-info-card__avatar {
            width: 44px; height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #28e98c22, #28e98c55);
            border: 1px solid rgba(40,233,140,.3);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .proj-info-card__avatar i { color: #28e98c; font-size: 16px; }
        .proj-info-card__head-label { font-size: 11px; letter-spacing: 1.4px; text-transform: uppercase; color: #555; font-weight: 600; margin-bottom: 2px; }
        .proj-info-card__head-title { font-size: 15px; color: #fff; font-weight: 600; }

        /* rows */
        .proj-info-card__body { padding: 8px 0; }
        .proj-info-row {
            display: flex;
            align-items: flex-start;
            gap: 16px;
            padding: 18px 28px;
            transition: background .2s;
        }
        .proj-info-row:hover { background: rgba(255,255,255,.02); }
        .proj-info-row__icon {
            width: 36px; height: 36px;
            border-radius: 10px;
            background: rgba(255,255,255,.04);
            border: 1px solid rgba(255,255,255,.07);
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
            margin-top: 2px;
        }
        .proj-info-row__icon i { font-size: 13px; color: #28e98c; }
        .proj-info-row__label {
            font-size: 10px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: #444;
            font-weight: 600;
            margin-bottom: 5px;
        }
        .proj-info-row__value {
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
            margin: 0;
        }
        .proj-info-row__value a {
            color: #28e98c;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: gap .2s;
        }
        .proj-info-row__value a::after { content: '↗'; font-size: 11px; }
        .proj-info-row__value a:hover { gap: 9px; }

        /* divider between rows */
        .proj-info-row + .proj-info-row {
            border-top: 1px solid rgba(255,255,255,.04);
        }

        /* CTA button at bottom */
        .proj-info-card__cta {
            padding: 20px 28px 26px;
            border-top: 1px solid rgba(255,255,255,.05);
        }
        .proj-info-cta-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            background: linear-gradient(135deg, #28e98c, #1bc77a);
            color: #0a0a0a;
            font-size: 13px;
            font-weight: 700;
            letter-spacing: .5px;
            text-decoration: none;
            transition: transform .25s, box-shadow .25s;
            box-shadow: 0 8px 24px rgba(40,233,140,.25);
        }
        .proj-info-cta-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 36px rgba(40,233,140,.4);
            color: #0a0a0a;
        }

        /* ── Gallery ── */
        #work-gallery .img { overflow: hidden; border-radius: 10px; cursor: zoom-in; }
        #work-gallery img {
            border-radius: 10px;
            width: 100%;
            display: block;
            transform: scale(1.03);
            transition: transform .6s cubic-bezier(.22,1,.36,1), box-shadow .3s;
        }
        #work-gallery .img:hover img { transform: scale(1.07); }
        #work-gallery .img:hover { box-shadow: 0 20px 60px rgba(0,0,0,.5); }

        /* ── Lightbox ── */
        #lightbox {
            position: fixed;
            inset: 0;
            z-index: 99995;
            background: rgba(0,0,0,.95);
            display: flex;
            align-items: center;
            justify-content: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity .3s ease;
            backdrop-filter: blur(12px);
        }
        #lightbox.open { opacity: 1; pointer-events: all; }
        #lightbox-img {
            max-width: 90vw;
            max-height: 88vh;
            border-radius: 10px;
            object-fit: contain;
            transform: scale(.92);
            transition: transform .35s cubic-bezier(.22,1,.36,1);
            box-shadow: 0 40px 100px rgba(0,0,0,.8);
        }
        #lightbox.open #lightbox-img { transform: scale(1); }
        #lightbox-close {
            position: absolute;
            top: 24px; right: 28px;
            width: 44px; height: 44px;
            border-radius: 50%;
            background: rgba(255,255,255,.08);
            border: 1px solid rgba(255,255,255,.12);
            color: #fff;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background .2s, transform .2s;
        }
        #lightbox-close:hover { background: rgba(255,255,255,.18); transform: rotate(90deg); }
        .lightbox-nav {
            position: absolute;
            top: 50%; transform: translateY(-50%);
            width: 48px; height: 48px;
            border-radius: 50%;
            background: rgba(255,255,255,.07);
            border: 1px solid rgba(255,255,255,.12);
            color: #fff;
            font-size: 18px;
            display: flex; align-items: center; justify-content: center;
            cursor: pointer;
            transition: background .2s, transform .2s;
        }
        .lightbox-nav:hover { background: #28e98c; color: #111; }
        #lightbox-prev { left: 24px; }
        #lightbox-next { right: 24px; }
        #lightbox-counter {
            position: absolute;
            bottom: 24px;
            left: 50%; transform: translateX(-50%);
            font-size: 12px;
            color: rgba(255,255,255,.4);
            letter-spacing: 1.5px;
        }

        /* ── Similar Projects ── */
        .similar-section {
            padding: 80px 0 40px;
            border-top: 1px solid rgba(255,255,255,.06);
            margin-top: 80px;
        }
        .similar-label {
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #28e98c;
            font-weight: 600;
            margin-bottom: 10px;
        }
        .similar-heading {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
        }
        .similar-card {
            display: block;
            border-radius: 16px;
            overflow: hidden;
            background: #0d0d0d;
            border: 1px solid rgba(255,255,255,.06);
            text-decoration: none;
            transition: transform .35s cubic-bezier(.22,1,.36,1), box-shadow .35s, border-color .3s;
            position: relative;
        }
        .similar-card:hover {
            transform: translateY(-6px);
            box-shadow: 0 24px 60px rgba(0,0,0,.6);
            border-color: rgba(40,233,140,.2);
        }
        .similar-card__img {
            width: 100%;
            aspect-ratio: 16/10;
            object-fit: cover;
            display: block;
            transition: transform .6s cubic-bezier(.22,1,.36,1);
        }
        .similar-card:hover .similar-card__img { transform: scale(1.04); }
        .similar-card__img-wrap { overflow: hidden; }
        .similar-card__body { padding: 20px 22px 22px; }
        .similar-card__cat {
            font-size: 10px;
            letter-spacing: 1.4px;
            text-transform: uppercase;
            color: #28e98c;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .similar-card__title {
            font-size: 16px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 6px;
            line-height: 1.4;
        }
        .similar-card__date { font-size: 12px; color: #555; }
        .similar-card__arrow {
            position: absolute;
            top: 16px; right: 16px;
            width: 34px; height: 34px;
            border-radius: 50%;
            background: rgba(0,0,0,.5);
            border: 1px solid rgba(255,255,255,.1);
            display: flex; align-items: center; justify-content: center;
            color: #fff;
            font-size: 12px;
            opacity: 0;
            transform: translateY(4px);
            transition: opacity .25s, transform .25s, background .25s;
        }
        .similar-card:hover .similar-card__arrow {
            opacity: 1;
            transform: translateY(0);
            background: #28e98c;
            color: #111;
            border-color: #28e98c;
        }

        /* ── Prev/Next nav buttons ── */
        .proj-nav-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 12px 22px;
            border: 1px solid rgba(255,255,255,.12);
            border-radius: 60px;
            font-size: 12px;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: #ccc;
            text-decoration: none;
            transition: all .3s;
            white-space: nowrap;
        }
        .proj-nav-btn:hover {
            background: #28e98c;
            border-color: #28e98c;
            color: #111;
            transform: translateY(-2px);
        }

        /* ── Progress bar ── */
        #read-progress {
            position: fixed;
            top: 0; left: 0;
            height: 3px;
            width: 0%;
            background: linear-gradient(90deg, #28e98c, #1bc77a);
            z-index: 9999;
            transition: width .1s linear;
            box-shadow: 0 0 10px #28e98c88;
        }

        /* ── Floating Hire Me (dark pattern) ── */
        .hire-me-float {
            position: fixed;
            bottom: 36px;
            right: 28px;
            z-index: 9990;
            display: inline-flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #28e98c;
            color: #111;
            font-weight: 700;
            font-size: 13px;
            letter-spacing: .5px;
            padding: 14px 22px;
            border-radius: 50px;
            text-decoration: none;
            box-shadow: 0 8px 32px rgba(40,233,140,.35);
            transition: transform .25s, box-shadow .25s;
        }
        .hire-me-float:hover { transform: translateY(-4px) scale(1.04); box-shadow: 0 14px 40px rgba(40,233,140,.5); color: #111; }
        .hire-pulse {
            position: absolute;
            top: -4px; right: -4px;
            width: 12px; height: 12px;
            border-radius: 50%;
            background: #ff4757;
            animation: pulse-ring 1.5s ease infinite;
        }
        .hire-reply-badge {
            font-size: 10px;
            font-weight: 500;
            color: #1a5c3a;
            margin-top: 3px;
            letter-spacing: .3px;
        }
        @keyframes pulse-ring {
            0%   { transform: scale(1); opacity: 1; }
            70%  { transform: scale(2.2); opacity: 0; }
            100% { transform: scale(1); opacity: 0; }
        }

        /* ── Tags (category pills) ── */
        .proj-tags { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; }
        .proj-tag {
            padding: 5px 14px;
            border-radius: 20px;
            border: 1px solid rgba(40,233,140,.3);
            color: #28e98c;
            font-size: 11px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* ── Tools chips ── */
        .tools-label {
            font-size: 11px;
            letter-spacing: 1.6px;
            text-transform: uppercase;
            color: #444;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .tools-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        .tool-chip {
            display: inline-flex;
            align-items: center;
            gap: 9px;
            padding: 9px 16px;
            background: rgba(255,255,255,.03);
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 10px;
            font-size: 13px;
            color: #ccc;
            font-weight: 500;
            transition: background .2s, border-color .2s, transform .2s;
            cursor: default;
        }
        .tool-chip:hover {
            background: rgba(40,233,140,.07);
            border-color: rgba(40,233,140,.25);
            color: #fff;
            transform: translateY(-2px);
        }
        .tool-chip img {
            width: 18px;
            height: 18px;
            object-fit: contain;
            flex-shrink: 0;
            filter: brightness(0.9);
        }
        .tool-chip .tool-icon-svg {
            width: 18px; height: 18px;
            display: flex; align-items: center; justify-content: center;
            flex-shrink: 0;
        }
        .tool-chip .tool-icon-svg i { font-size: 14px; color: #28e98c; }
    </style>

</head>

                    <div class="row justify-content-center">
                        <div class="col-lg-11">
                            <div id="work-gallery" class="row md-marg" style="gap:0 0 24px;"></div>
                        </div>
                    </div>
                </div>

                <!-- Similar Projects + Prev/Next -->
                <div class="similar-section fade-up">
                    <div class="row justify-content-center">
                        <div class="col-lg-12">
                            <div class="d-flex align-items-center mb-40">
                                <div>
                                    <div class="similar-label">More Work</div>
                                    <div class="similar-heading" style="margin-bottom:0;">Similar Projects</div>
                                </div>
                                <div class="d-flex gap-12 ml-auto" style="gap:12px;">
                                    <a id="work-prev" href="#" class="proj-nav-btn"><i class="fas fa-long-arrow-alt-left"></i> Prev</a>
                                    <a id="work-next" href="#" class="proj-nav-btn">Next <i class="fas fa-long-arrow-alt-right"></i></a>
                                </div>
                            </div>
                            <div class="row" id="similar-grid"></div>
                        </div>
                    </div>
                </div>

            </div>
        </section>
    </main>

    <script>
        // ── Populate work data ──
        var key = new URLSearchParams(window.location.search).get('work');
        var work = worksData.find(function(w){ return w.key === key; });

        if (!work) {
            document.querySelector('.project').innerHTML = '<div class="container text-center" style="padding:100px 0"><h3>Project not found.</h3><a href="portfolio.html" style="color:#28e98c">Back to Portfolio</a></div>';
        } else {
            document.getElementById('page-title').textContent = work.title;
            document.getElementById('breadcrumb-title').textContent = work.title;
            document.getElementById('work-title-card').textContent = work.title;
            document.getElementById('work-hero').src = work.heroImage;
            document.getElementById('work-hero').alt = work.title;
            document.getElementById('work-title').textContent = work.title;
            document.getElementById('work-description').textContent = work.description;
            document.getElementById('work-sub-description').textContent = work.subDescription;
            document.getElementById('work-date').textContent = work.date;
            document.getElementById('work-category').textContent = work.category;
            document.getElementById('work-client').textContent = work.client;

            // Category tags
            var tagsEl = document.getElementById('work-tags');
            (work.category || '').split(',').forEach(function(t) {
                if (t.trim()) tagsEl.innerHTML += '<span class="proj-tag">' + t.trim() + '</span>';
            });

            if (work.website && work.website.url) {
                document.getElementById('work-website-link').href = work.website.url;
                document.getElementById('work-website-link').textContent = work.website.label || work.website.url;
            } else {
                document.getElementById('work-website-li').style.display = 'none';
            }

            // ── Tool icons map ──
            var toolIcons = {
                'figma':          { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/figma/figma-original.svg' },
                'photoshop':      { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/photoshop/photoshop-plain.svg', bright: true },
                'adobe photoshop':{ img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/photoshop/photoshop-plain.svg', bright: true },
                'illustrator':    { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/illustrator/illustrator-plain.svg', bright: true },
                'adobe illustrator':{ img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/illustrator/illustrator-plain.svg', bright: true },
                'canva':          { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/canva/canva-original.svg' },
                'html':           { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg' },
                'html - css - js':{ img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/html5/html5-original.svg' },
                'css':            { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/css3/css3-original.svg' },
                'js':             { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg' },
                'javascript':     { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/javascript/javascript-original.svg' },
                'php':            { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/php/php-original.svg' },
                'mysql':          { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg' },
                'mysql - php':    { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/mysql/mysql-original.svg' },
                'cpanel':         { fa: 'fas fa-server' },
                'miro':           { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/jira/jira-original.svg' },
                'figjam':         { fa: 'fas fa-diagram-project' },
                'notion':         { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/notion/notion-original.svg' },
                'blender':        { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/blender/blender-original.svg' },
                '3d blender':     { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/blender/blender-original.svg' },
                'ai tools':       { fa: 'fas fa-robot' },
                'react':          { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/react/react-original.svg' },
                'vue':            { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/vuejs/vuejs-original.svg' },
                'wordpress':      { img: 'https://cdn.jsdelivr.net/gh/devicons/devicon/icons/wordpress/wordpress-original.svg' }
            };

            var toolsHTML = '<div class="tools-label">Tools & Technologies</div><div class="tools-grid">';
            work.tools.forEach(function(tool) {
                var key = tool.toLowerCase().trim();
                var icon = toolIcons[key];
                var iconHTML = '';
                if (icon) {
                    if (icon.img) {
                        var style = icon.bright ? ' style="filter:brightness(4) saturate(1.4)"' : '';
                        iconHTML = '<img src="' + icon.img + '" alt="' + tool + '"' + style + ' onerror="this.style.display=\'none\'">';
                    } else if (icon.fa) {
                        iconHTML = '<span class="tool-icon-svg"><i class="' + icon.fa + '"></i></span>';
                    }
                } else {
                    iconHTML = '<span class="tool-icon-svg"><i class="fas fa-tools"></i></span>';
                }
                toolsHTML += '<span class="tool-chip">' + iconHTML + tool + '</span>';
            });
            toolsHTML += '</div>';
            document.getElementById('work-tools').innerHTML = toolsHTML;

            // ── Gallery with lightbox ──
            var galleryImages = work.gallery;
            var galleryHTML = '';
            galleryImages.forEach(function(img, i) {
                var mb = (i % 2 === 0) ? 'sm-mb30' : '';
                galleryHTML += '<div class="col-md-6 mb-30"><div class="img ' + mb + '" onclick="openLightbox(' + i + ')"><img src="' + img + '" alt="' + work.title + ' ' + (i+1) + '" loading="lazy"></div></div>';
            });
            document.getElementById('work-gallery').innerHTML = galleryHTML;

            document.getElementById('work-prev').href = 'projects.html?work=' + work.prev;
            document.getElementById('work-next').href = 'projects.html?work=' + work.next;

            // ── Similar Projects ──
            var similar = worksData.filter(function(w) {
                return w.key !== work.key && w.category === work.category;
            }).slice(0, 3);
            // fallback: if fewer than 2 same-category, fill with prev/next
            if (similar.length < 2) {
                worksData.forEach(function(w) {
                    if (w.key !== work.key && similar.findIndex(function(s){ return s.key === w.key; }) === -1 && similar.length < 3) {
                        similar.push(w);
                    }
                });
            }
            var similarHTML = '';
            similar.forEach(function(w) {
                similarHTML += '<div class="col-lg-4 col-md-6 mb-30">' +
                    '<a href="projects.html?work=' + w.key + '" class="similar-card">' +
                        '<div class="similar-card__img-wrap"><img class="similar-card__img" src="' + w.heroImage + '" alt="' + w.title + '" loading="lazy"></div>' +
                        '<div class="similar-card__body">' +
                            '<div class="similar-card__cat">' + w.category + '</div>' +
                            '<div class="similar-card__title">' + w.title + '</div>' +
                            '<div class="similar-card__date">' + w.date + '</div>' +
                        '</div>' +
                        '<div class="similar-card__arrow"><i class="fas fa-arrow-right"></i></div>' +
                    '</a>' +
                '</div>';
            });
            document.getElementById('similar-grid').innerHTML = similarHTML;
        }

        // ── Lightbox ──
        var lbImages = [];
        var lbIndex = 0;
        function openLightbox(i) {
            lbImages = work ? work.gallery : [];
            lbIndex = i;
            updateLightbox();
            document.getElementById('lightbox').classList.add('open');
            document.body.style.overflow = 'hidden';
        }
        function closeLightbox() {
            document.getElementById('lightbox').classList.remove('open');
            document.body.style.overflow = '';
        }
        function updateLightbox() {
            var img = document.getElementById('lightbox-img');
            img.style.opacity = '0';
            img.style.transform = 'scale(.92)';
            setTimeout(function() {
                img.src = lbImages[lbIndex];
                img.style.opacity = '1';
                img.style.transform = 'scale(1)';
            }, 120);
            document.getElementById('lightbox-counter').textContent = (lbIndex + 1) + ' / ' + lbImages.length;
        }
        document.getElementById('lightbox-img').style.transition = 'opacity .2s ease, transform .35s cubic-bezier(.22,1,.36,1)';
        document.getElementById('lightbox-close').addEventListener('click', closeLightbox);
        document.getElementById('lightbox-prev').addEventListener('click', function() {
            lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length;
            updateLightbox();
        });
        document.getElementById('lightbox-next').addEventListener('click', function() {
            lbIndex = (lbIndex + 1) % lbImages.length;
            updateLightbox();
        });
        document.getElementById('lightbox').addEventListener('click', function(e) {
            if (e.target === this) closeLightbox();
        });
        document.addEventListener('keydown', function(e) {
            if (!document.getElementById('lightbox').classList.contains('open')) return;
            if (e.key === 'Escape') closeLightbox();
            if (e.key === 'ArrowLeft') { lbIndex = (lbIndex - 1 + lbImages.length) % lbImages.length; updateLightbox(); }
            if (e.key === 'ArrowRight') { lbIndex = (lbIndex + 1) % lbImages.length; updateLightbox(); }
        });

        // ── Read progress bar ──
        window.addEventListener('scroll', function() {
            var s = document.documentElement.scrollTop || document.body.scrollTop;
            var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById('read-progress').style.width = (s / h * 100) + '%';
        });

        // ── Intersection Observer fade-up ──
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) {
                    e.target.classList.add('visible');
                    observer.unobserve(e.target);
                }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(function(el) { observer.observe(el); });

        // ── Hero zoom-out on reveal ──
        var heroWrap = document.querySelector('.proj-hero-wrap');
        if (heroWrap) {
            var heroObserver = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting) {
                    setTimeout(function() { heroWrap.classList.add('revealed'); }, 200);
                    heroObserver.disconnect();
                }
            }, { threshold: 0.1 });
            heroObserver.observe(heroWrap);
        }
        // ── Cursor trail ──
        var trailCanvas = document.getElementById('trailCanvas');
        var tctx = trailCanvas.getContext('2d');
        trailCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99998;';
        trailCanvas.width = window.innerWidth;
        trailCanvas.height = window.innerHeight;
        window.addEventListener('resize', function() { trailCanvas.width = window.innerWidth; trailCanvas.height = window.innerHeight; });
        var trail = [];
        window.addEventListener('mousemove', function(e) {
            trail.push({ x: e.clientX, y: e.clientY, life: 1 });
            if (trail.length > 20) trail.shift();
        });
        function drawTrail() {
            tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            trail.forEach(function(p, i) {
                p.life -= 0.04;
                if (p.life <= 0) return;
                var r = (i / trail.length) * 5;
                tctx.beginPath();
                tctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                tctx.fillStyle = 'rgba(40,233,140,' + (p.life * 0.6) + ')';
                tctx.shadowColor = '#28e98c';
                tctx.shadowBlur = 8;
                tctx.fill();
            });
            trail = trail.filter(function(p){ return p.life > 0; });
            requestAnimationFrame(drawTrail);
        }
        drawTrail();

        // ── Magnetic buttons ──
        document.querySelectorAll('.magnetic-btn').forEach(function(btn) {
            btn.addEventListener('mousemove', function(e) {
                var r = btn.getBoundingClientRect();
                var x = (e.clientX - r.left - r.width / 2) * 0.25;
                var y = (e.clientY - r.top - r.height / 2) * 0.25;
                btn.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
                btn.style.transition = 'transform 0.1s ease';
            });
            btn.addEventListener('mouseleave', function() {
                btn.style.transform = 'translate(0,0)';
                btn.style.transition = 'transform 0.4s ease';
            });
        });
    </script>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/jquery-migrate-3.4.0.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/scripts.js"></script>

    <script>
        // ── Hide cursor dot on touch devices (runs after scripts.js) ──
        (function() {
            var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            function killCursor() {
                var c = document.querySelector('.cursor');
                if (c) { c.style.cssText = 'display:none!important;opacity:0!important;visibility:hidden!important;'; }
                var canvas = document.getElementById('trailCanvas');
                if (canvas) canvas.style.display = 'none';
            }
            if (isTouchDevice) {
                killCursor();
            }
            window.addEventListener('touchstart', killCursor, { passive: true, once: false });
        })();
    </script>
</body></html>
