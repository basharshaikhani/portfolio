    <main>

                <div class="next-prev">

    <script>
        var key = new URLSearchParams(window.location.search).get('work');
        var work = worksData.find(function(w){ return w.key === key; });

        if (!work) {
            document.querySelector('.project').innerHTML = '<div class="container text-center" style="padding:100px 0"><h3>Project not found. Key: ' + key + '</h3><a href="portfolio.html">Back to Portfolio</a></div>';
        } else {
            document.getElementById('page-title').textContent = work.title;
            document.getElementById('work-hero').src = work.heroImage;
            document.getElementById('work-hero').alt = work.title;
            document.getElementById('work-title').textContent = work.title;
            document.getElementById('work-description').textContent = work.description;
            document.getElementById('work-sub-description').textContent = work.subDescription;
            document.getElementById('work-date').textContent = work.date;
            document.getElementById('work-category').textContent = work.category;
            document.getElementById('work-client').textContent = work.client;

            if (work.website && work.website.url) {
                document.getElementById('work-website-link').href = work.website.url;
                document.getElementById('work-website-link').textContent = work.website.label || work.website.url;
            } else {
                document.getElementById('work-website-li').style.display = 'none';
            }

            var arrowSVG = '<svg width="100%" height="100%" viewBox="0 0 9 8" fill="none" xmlns="http://www.w3.org/2000/svg"><path fill-rule="evenodd" clip-rule="evenodd" d="M7.71108 3.78684L8.22361 4.29813L7.71263 4.80992L4.64672 7.87832L4.13433 7.36688L6.87531 4.62335H1.11181H0.750039H0.388177L0.382812 0.718232H1.10645L1.11082 3.90005H6.80113L4.12591 1.22972L4.63689 0.718262L7.71108 3.78684Z" fill="#fff"></path></svg>';
            var toolsEl = document.getElementById('work-tools');
            var toolsHTML = '';
            work.tools.forEach(function(tool, i) {
                toolsHTML += '<li class="' + (i > 0 ? 'mt-20' : '') + '"><span class="icon">' + arrowSVG + '</span><h6 class="inline fz-18">' + tool + '</h6></li>';
            });
            toolsEl.innerHTML = toolsHTML;

            var galleryEl = document.getElementById('work-gallery');
            var galleryHTML = '';
            work.gallery.forEach(function(img, i) {
                if (i % 2 === 0 && i !== 0) galleryHTML += '<div class="col-12"><br></div>';
                var mb = (i % 2 === 0) ? 'sm-mb30' : '';
                galleryHTML += '<div class="col-md-6"><div class="img ' + mb + '"><img src="' + img + '" alt="' + work.title + ' ' + (i+1) + '" loading="lazy"></div></div>';
            });
            galleryEl.innerHTML = galleryHTML;

            document.getElementById('work-prev').href = 'projects.html?work=' + work.prev;
            document.getElementById('work-next').href = 'projects.html?work=' + work.next;
        }
    </script>
