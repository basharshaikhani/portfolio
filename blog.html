        /* ── Hero ── */
        .proj-hero-wrap {
            position: relative;
            overflow: hidden;
            border-radius: 12px;
            margin-bottom: 80px;
        }
        .proj-hero-wrap img {
            width: 100%;

            border-radius: 12px;

        }
        .proj-hero-wrap.revealed img { transform: scale(1); }
        .proj-hero-overlay {

        }

        /* ── Breadcrumb ── */
        .proj-breadcrumb {

            gap: 8px;

        /* ── Fade-up ── */

        .fade-up.visible { opacity: 1; transform: translateY(0); }

        /* ── Info card ── */

            background: #0d0d0d;

        .proj-info-card__bar {

            background: linear-gradient(90deg, #28e98c, #1be4af, #28e98c);

        .proj-info-card__head {

        }

    <script>
        var key = new URLSearchParams(window.location.search).get('blog');
        var blog = blogsData.find(function(b){ return b.key === key; });

        if (!blog) {
            document.querySelector('.project').innerHTML = '<div class="container text-center" style="padding:100px 0"><h3>Article not found.</h3><a href="index.html#blog" style="color:#28e98c">Back to Blog</a></div>';
        } else {
            document.getElementById('page-title').textContent = blog.title;
            document.getElementById('breadcrumb-title').textContent = blog.title;
            document.getElementById('blog-title-card').textContent = blog.title;
            document.getElementById('blog-hero').src = blog.heroImage || '';
            document.getElementById('blog-hero').alt = blog.title;
            document.getElementById('blog-title').textContent = blog.title;
            document.getElementById('blog-description').textContent = blog.description || '';
            document.getElementById('blog-sub-description').textContent = blog.subDescription || '';
            document.getElementById('blog-date').textContent = blog.date || '';
            document.getElementById('blog-category').textContent = blog.category || '';
            document.getElementById('blog-author').textContent = blog.author || 'Bashar Shaikhani';

            if (blog.readTime) {
                document.getElementById('blog-readtime').textContent = blog.readTime;
            } else {
                document.getElementById('blog-readtime-row').style.display = 'none';
            }

            // Tags
            var tagsEl = document.getElementById('blog-tags');
            (blog.category || '').split(',').forEach(function(t) {
                if (t.trim()) tagsEl.innerHTML += '<span class="proj-tag">' + t.trim() + '</span>';
            });
            if (blog.readTime) tagsEl.innerHTML += '<span class="proj-tag" style="border-color:rgba(255,255,255,.15);color:#aaa;">' + blog.readTime + '</span>';

            // Inject full blog content directly from data
            if (blog.content) {
                document.getElementById('blog-full-content').innerHTML = blog.content;
                document.getElementById('blog-content-wrap').style.cssText = '';
            }

            // Prev / Next
            document.getElementById('blog-prev').href = blog.prev ? 'blog.html?blog=' + blog.prev : 'index.html#blog';
            document.getElementById('blog-next').href = blog.next ? 'blog.html?blog=' + blog.next : 'index.html#blog';

            // Similar blogs
            var similar = blogsData.filter(function(b) {
                return b.key !== blog.key && b.category === blog.category;
            }).slice(0, 3);
            if (similar.length < 2) {
                blogsData.forEach(function(b) {
                    if (b.key !== blog.key && similar.findIndex(function(s){ return s.key === b.key; }) === -1 && similar.length < 3) {
                        similar.push(b);
                    }
                });
            }
            var similarHTML = '';
            similar.forEach(function(b) {
                similarHTML += '<div class="col-lg-4 col-md-6 mb-30">' +
                    '<a href="blog.html?blog=' + b.key + '" class="similar-card">' +
                        '<div class="similar-card__img-wrap"><img class="similar-card__img" src="' + (b.heroImage || '') + '" alt="' + b.title + '" loading="lazy"></div>' +
                        '<div class="similar-card__body">' +
                            '<div class="similar-card__cat">' + (b.category || '') + '</div>' +
                            '<div class="similar-card__title">' + b.title + '</div>' +
                            '<div class="similar-card__date">' + (b.date || '') + '</div>' +
                        '</div>' +
                        '<div class="similar-card__arrow"><i class="fas fa-arrow-right"></i></div>' +
                    '</a>' +
                '</div>';
            });
            document.getElementById('similar-grid').innerHTML = similarHTML;
        }

        // ── Read progress bar ──
        window.addEventListener('scroll', function() {
            var s = document.documentElement.scrollTop || document.body.scrollTop;
            var h = document.documentElement.scrollHeight - document.documentElement.clientHeight;
            document.getElementById('read-progress').style.width = (s / h * 100) + '%';
        });

        // ── Intersection Observer fade-up ──
        var observer = new IntersectionObserver(function(entries) {
            entries.forEach(function(e) {
                if (e.isIntersecting) { e.target.classList.add('visible'); observer.unobserve(e.target); }
            });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-up').forEach(function(el) { observer.observe(el); });

        // ── Hero zoom-out ──
        var heroWrap = document.querySelector('.proj-hero-wrap');
        if (heroWrap) {
            var heroObserver = new IntersectionObserver(function(entries) {
                if (entries[0].isIntersecting) { setTimeout(function() { heroWrap.classList.add('revealed'); }, 200); heroObserver.disconnect(); }
            }, { threshold: 0.1 });
            heroObserver.observe(heroWrap);
        }

        // ── Cursor trail ──
        var trailCanvas = document.getElementById('trailCanvas');
        var tctx = trailCanvas.getContext('2d');
        trailCanvas.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:99998;';
        trailCanvas.width = window.innerWidth;
        trailCanvas.height = window.innerHeight;
        window.addEventListener('resize', function() { trailCanvas.width = window.innerWidth; trailCanvas.height = window.innerHeight; });
        var trail = [];
        window.addEventListener('mousemove', function(e) { trail.push({ x: e.clientX, y: e.clientY, life: 1 }); if (trail.length > 20) trail.shift(); });
        function drawTrail() {
            tctx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
            trail.forEach(function(p, i) {
                p.life -= 0.04;
                if (p.life <= 0) return;
                var r = (i / trail.length) * 5;
                tctx.beginPath();
                tctx.arc(p.x, p.y, r, 0, Math.PI * 2);
                tctx.fillStyle = 'rgba(40,233,140,' + (p.life * 0.6) + ')';
                tctx.shadowColor = '#28e98c';
                tctx.shadowBlur = 8;
                tctx.fill();
            });
            trail = trail.filter(function(p){ return p.life > 0; });
            requestAnimationFrame(drawTrail);
        }
        drawTrail();

        // ── Magnetic buttons ──
        document.querySelectorAll('.magnetic-btn').forEach(function(btn) {
            btn.addEventListener('mousemove', function(e) {
                var r = btn.getBoundingClientRect();
                var x = (e.clientX - r.left - r.width / 2) * 0.25;
                var y = (e.clientY - r.top - r.height / 2) * 0.25;
                btn.style.transform = 'translate(' + x + 'px, ' + y + 'px)';
                btn.style.transition = 'transform 0.1s ease';
            });
            btn.addEventListener('mouseleave', function() {
                btn.style.transform = 'translate(0,0)';
                btn.style.transition = 'transform 0.4s ease';
            });
        });
    </script>

    <script src="js/jquery-3.6.0.min.js"></script>
    <script src="js/jquery-migrate-3.4.0.min.js"></script>
    <script src="js/plugins.js"></script>
    <script src="js/scripts.js"></script>

    <script>
        (function() {
            var isTouchDevice = ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
            function killCursor() {
                var c = document.querySelector('.cursor');
                if (c) { c.style.cssText = 'display:none!important;opacity:0!important;visibility:hidden!important;'; }
                var canvas = document.getElementById('trailCanvas');
                if (canvas) canvas.style.display = 'none';
            }
            if (isTouchDevice) killCursor();
            window.addEventListener('touchstart', killCursor, { passive: true, once: false });
        })();
    </script>
</body></html>
